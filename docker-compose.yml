services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prontto
      POSTGRES_USER: prontto
      POSTGRES_PASSWORD: prontto_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prontto"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Database=prontto;Username=prontto;Password=prontto_dev"
      SESSION_SECRET: prontto-secret-dev
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
