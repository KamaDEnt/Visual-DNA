<div class="pagina-auth">
  <div class="card-auth">
    <!-- Logo -->
    <a routerLink="/" class="auth-logo">
      <span class="logo-pront">PRONT</span><span class="logo-to">TO</span>
    </a>

    <h1 class="auth-titulo">Bem-vindo de volta</h1>
    <p class="auth-subtitulo">Entre na sua conta para continuar</p>

    @if (erro()) {
      <div class="auth-erro" role="alert">
        <span>&#9888;</span> {{ erro() }}
      </div>
    }

    <form [formGroup]="formulario" (ngSubmit)="entrar()" novalidate>
      <div class="campo">
        <label for="email">E-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="seu@email.com"
          autocomplete="email"
        />
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input
          id="senha"
          type="password"
          formControlName="senha"
          placeholder="Mínimo 8 caracteres"
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn-submit" [disabled]="formulario.invalid || carregando()">
        {{ carregando() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-link">
      Não tem conta? <a routerLink="/cadastrar">Cadastre-se grátis</a>
    </p>
  </div>
</div>
