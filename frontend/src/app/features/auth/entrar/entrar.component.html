<div class="pagina-auth">
  <div class="card-auth">
    <!-- Logo -->
    <a routerLink="/" class="auth-logo">
      <span class="logo-pront">PRONT</span><span class="logo-to">TO</span>
    </a>

    <h1 class="auth-titulo">Bem-vindo de volta</h1>
    <p class="auth-subtitulo">Entre na sua conta para continuar</p>

    @if (erro()) {
      <div class="auth-erro" role="alert">
        <span>&#9888;</span> {{ erro() }}
      </div>
    }

    <form [formGroup]="formulario" (ngSubmit)="entrar()" novalidate>
      <div class="campo">
        <label for="email">E-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="seu@email.com"
          autocomplete="email"
        />
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <div class="campo-senha">
          <input
            id="senha"
            [type]="senhaVisivel() ? 'text' : 'password'"
            formControlName="senha"
            placeholder="Mínimo 8 caracteres"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="btn-toggle-senha"
            (click)="senhaVisivel.set(!senhaVisivel())"
            [attr.aria-label]="senhaVisivel() ? 'Ocultar senha' : 'Mostrar senha'"
          >
            @if (senhaVisivel()) {
              <!-- olho fechado -->
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <!-- olho aberto -->
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="formulario.invalid || carregando()">
        {{ carregando() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-link">
      Não tem conta? <a routerLink="/cadastrar">Cadastre-se grátis</a>
    </p>
  </div>
</div>
