<div class="pagina-auth">
  <div class="card-auth">
    <!-- Logo -->
    <a routerLink="/" class="auth-logo">
      <span class="logo-pront">PRONT</span><span class="logo-to">TO</span>
    </a>

    <h1 class="auth-titulo">Criar conta</h1>
    <p class="auth-subtitulo">Junte-se a milhares de usuários no Prontto</p>

    @if (erro()) {
      <div class="auth-erro" role="alert">
        <span>&#9888;</span> {{ erro() }}
      </div>
    }

    <form [formGroup]="formulario" (ngSubmit)="cadastrar()" novalidate>
      <div class="campo">
        <label for="nome">Nome completo</label>
        <input
          id="nome"
          type="text"
          formControlName="nome"
          placeholder="Seu nome"
          autocomplete="name"
        />
      </div>

      <div class="campo">
        <label for="email">E-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="seu@email.com"
          autocomplete="email"
        />
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <div class="campo-senha">
          <input
            id="senha"
            [type]="senhaVisivel() ? 'text' : 'password'"
            formControlName="senha"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
          />
          <button
            type="button"
            class="btn-toggle-senha"
            (click)="senhaVisivel.set(!senhaVisivel())"
            [attr.aria-label]="senhaVisivel() ? 'Ocultar senha' : 'Mostrar senha'"
          >
            @if (senhaVisivel()) {
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <div class="campo">
        <label for="tipoConta">Tipo de conta</label>
        <select id="tipoConta" formControlName="tipoConta" (change)="onTipoContaMudou($event)">
          <option value="cliente">Cliente</option>
          <option value="prestador">Prestador de serviço</option>
        </select>
      </div>

      <div class="campo">
        <label for="telefone">Telefone <span class="opcional">(opcional)</span></label>
        <input
          id="telefone"
          type="tel"
          formControlName="telefone"
          placeholder="(11) 99999-9999"
          autocomplete="tel"
        />
      </div>

      @if (ehPrestador()) {
        <div class="campo">
          <label for="especialidade">Especialidade</label>
          <input
            id="especialidade"
            type="text"
            formControlName="especialidade"
            placeholder="Ex: Encanador, Eletricista..."
          />
        </div>
      }

      <button type="submit" class="btn-submit" [disabled]="formulario.invalid || carregando()">
        {{ carregando() ? 'Criando conta...' : 'Criar conta' }}
      </button>
    </form>

    <p class="auth-link">
      Já tem conta? <a routerLink="/entrar">Entrar</a>
    </p>
  </div>
</div>
